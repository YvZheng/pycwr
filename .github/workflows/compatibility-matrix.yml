name: compatibility-matrix

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-install-test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-core.txt
            requirements-full.txt
            pyproject.toml
            setup.py

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Install full test dependencies
        run: python -m pip install -r requirements-full.txt

      - name: Build source and wheel distributions
        run: python -m build

      - name: Install wheel artifact
        run: python -m pip install --force-reinstall --no-deps dist/*.whl

      - name: Smoke-test installed wheel
        run: |
          python "${{ github.workspace }}/scripts/ci_import_smoke.py" \
            --repo-root "${{ github.workspace }}"
        working-directory: ${{ runner.temp }}

      - name: Reinstall from source distribution
        run: |
          python -m pip uninstall -y pycwr
          python -m pip install --force-reinstall --no-deps dist/*.tar.gz

      - name: Smoke-test installed sdist
        run: |
          python "${{ github.workspace }}/scripts/ci_import_smoke.py" \
            --repo-root "${{ github.workspace }}"
        working-directory: ${{ runner.temp }}

      - name: Run automated tests
        env:
          PYCWR_RUN_SLOW_SAMPLE_TESTS: "0"
        run: python -m unittest discover -s test -p 'test_*.py'
